name: 🤖 Daily Article Generator

on:
  schedule:
    - cron: "0 1 * * *"   # 6:00 AM Pakistan time (UTC+5)
  workflow_dispatch:

# ✅ FIX 1: Give GitHub Actions write permission
permissions:
  contents: write

jobs:
  generate-articles:
    name: Generate & Publish New Articles
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          # ✅ FIX 2: Use proper token with write access
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ✅ FIX 3: Updated to Node.js 24 (20 is deprecated)
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 🤖 Generate New Articles with Claude AI
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: node automation.js

      # ✅ FIX 4: Proper git config and push
      - name: 💾 Commit & Push New Articles
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto: New articles $(date +'%d %b %Y %H:%M')"
            git push origin main
          fi

      - name: ✅ Done
        run: echo "Articles generated and published!"
